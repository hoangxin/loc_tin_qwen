name: News Digest

on:
  schedule:
    # 08:30 UTC = 15:30 Asia/Ho_Chi_Minh
    - cron: '30 8 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Run news digest
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          QWEN_MODEL: ${{ secrets.QWEN_MODEL }}
        run: npx tsx scripts/run-digest.ts

      # Commits data/latest-digest.json if it changed - this push is what
      # triggers Vercel to rebuild the site with the new digest.
      - name: Commit updated digest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update news digest'
          file_pattern: data/latest-digest.json
