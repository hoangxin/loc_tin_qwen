name: News Digest

on:
  workflow_dispatch:
    inputs:
      hours:
        description: 'Tổng hợp tin trong bao nhiêu giờ gần nhất'
        required: false
        default: '24'
        type: string
      source:
        description: 'Nguồn tin: CafeF, Vietstock, Vnexpress, hoặc để trống = cả 3'
        required: false
        default: ''
        type: string
      categories:
        description: 'Danh sách mục (cách nhau bởi dấu phẩy), để trống = tất cả mục của nguồn'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Run news digest
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          QWEN_MODEL: ${{ secrets.QWEN_MODEL }}
          DIGEST_HOURS: ${{ github.event.inputs.hours || '24' }}
          DIGEST_SOURCE: ${{ github.event.inputs.source }}
          DIGEST_CATEGORIES: ${{ github.event.inputs.categories }}
        run: npx tsx scripts/run-digest.ts

      # Commits data/latest-digest.json if it changed - this push is what
      # triggers Vercel to rebuild the site with the new digest.
      - name: Commit updated digest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update news digest'
          file_pattern: data/latest-digest.json
